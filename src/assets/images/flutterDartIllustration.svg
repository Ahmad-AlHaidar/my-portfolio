<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" role="img" aria-label="Flutter and Dart mobile development">
  <defs>
    <linearGradient id="phoneBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#55198b"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2230"/>
      <stop offset="100%" stop-color="#171c28"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6c63ff" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Decorative circles -->
  <circle cx="90" cy="80" r="42" fill="#6c63ff" opacity="0.12"/>
  <circle cx="420" cy="340" r="56" fill="#00BCD4" opacity="0.1"/>
  <circle cx="430" cy="70" r="24" fill="#47C5FB" opacity="0.18"/>

  <!-- Phone -->
  <g filter="url(#softShadow)">
    <rect x="165" y="40" width="170" height="320" rx="28" fill="url(#phoneBody)"/>
    <rect x="178" y="68" width="144" height="264" rx="14" fill="url(#screenGlow)"/>
    <rect x="228" y="52" width="44" height="8" rx="4" fill="#ffffff" opacity="0.35"/>
    <circle cx="250" cy="346" r="10" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- Flutter logo on screen -->
  <g transform="translate(205 118) scale(1.15)">
    <path fill="#47C5FB" d="M7.5 36.5L24 20l8.5 8.5L16 45z"/>
    <path fill="#00569E" d="M24 4L7.5 20.5 16 29 32.5 12.5z"/>
    <path fill="#00C4B4" d="M24 20l16.5-7.5L32.5 4 16 20.5z"/>
    <path fill="#47C5FB" d="M24 20l8.5 8.5L16 45l8-8z"/>
  </g>

  <!-- Code lines on screen -->
  <rect x="198" y="220" width="72" height="6" rx="3" fill="#47C5FB" opacity="0.7"/>
  <rect x="198" y="238" width="104" height="6" rx="3" fill="#645beb" opacity="0.55"/>
  <rect x="198" y="256" width="88" height="6" rx="3" fill="#00BCD4" opacity="0.55"/>
  <rect x="198" y="274" width="64" height="6" rx="3" fill="#ffffff" opacity="0.25"/>

  <!-- Dart logo floating -->
  <g transform="translate(60 210) scale(1.55)">
    <circle cx="24" cy="24" r="30" fill="#171c28" opacity="0.35"/>
    <path fill="#01579B" d="M24 4C14.06 4 6 12.06 6 22s8.06 18 18 18c3.87 0 7.45-1.22 10.38-3.29L42 40V26.62C44.07 23.69 45.29 20.11 45.29 16.24 45.29 9.48 40.52 4 24 4z"/>
    <path fill="#00BCD4" d="M24 4v18.62L42 40H26.38L24 37.62V4z"/>
    <path fill="#FFFFFF" d="M24 22.62h9.38L42 40h-9.38L24 31.24V22.62z"/>
  </g>

  <!-- Small Flutter badge -->
  <g transform="translate(350 95) scale(0.95)">
    <circle cx="24" cy="24" r="30" fill="#171c28" opacity="0.35"/>
    <path fill="#47C5FB" d="M7.5 36.5L24 20l8.5 8.5L16 45z"/>
    <path fill="#00569E" d="M24 4L7.5 20.5 16 29 32.5 12.5z"/>
    <path fill="#00C4B4" d="M24 20l16.5-7.5L32.5 4 16 20.5z"/>
    <path fill="#47C5FB" d="M24 20l8.5 8.5L16 45l8-8z"/>
  </g>

  <!-- Platform labels -->
  <text x="118" y="390" fill="#868e96" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600">iOS</text>
  <text x="250" y="390" fill="#868e96" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Flutter</text>
  <text x="382" y="390" fill="#868e96" font-family="Montserrat, Arial, sans-serif" font-size="14" font-weight="600" text-anchor="end">Android</text>
</svg>
